<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHATI — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Noto+Sans+Georgian:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0a0a0a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

.demo-bg { text-align: center; }
.demo-bg h1 { font-size: 52px; font-weight: 300; letter-spacing: -2px; color: #fff; margin-bottom: 10px; }
.demo-bg p { font-size: 15px; color: #444; font-weight: 300; letter-spacing: 0.2px; }

/* WIDGET */
#chati-widget {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 99999;
  font-family: 'DM Sans', 'Noto Sans Georgian', sans-serif;
}

#chati-bubble {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #fff;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative;
  margin-left: auto;
}

#chati-bubble:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(0,0,0,0.3); }

.chati-unread {
  position: absolute;
  top: -3px;
  right: -3px;
  width: 18px;
  height: 18px;
  background: #ef4444;
  border-radius: 50%;
  border: 2px solid #0a0a0a;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chati-unread.show { opacity: 1; transform: scale(1); }

#chati-window {
  position: absolute;
  bottom: 68px;
  right: 0;
  width: 375px;
  height: 555px;
  background: #111;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 20px 70px rgba(0,0,0,0.55);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  transform: translateY(14px) scale(0.95);
  pointer-events: none;
  transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-origin: bottom right;
}

#chati-window.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}

.chati-header {
  padding: 16px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 11px;
  flex-shrink: 0;
}

.chati-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
  font-weight: 600;
  color: #000;
  letter-spacing: -0.5px;
}

.chati-header-info { flex: 1; }
.chati-header-name { font-size: 14.5px; font-weight: 500; color: #fff; letter-spacing: -0.2px; }

.chati-header-status {
  font-size: 11.5px;
  color: #555;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 1px;
}

.chati-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: blink 2.5s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.chati-close {
  background: none;
  border: none;
  cursor: pointer;
  color: #444;
  padding: 6px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  transition: color 0.2s, background 0.2s;
}
.chati-close:hover { color: #888; background: rgba(255,255,255,0.05); }

.chati-messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}

.chati-messages::-webkit-scrollbar { width: 3px; }
.chati-messages::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

.chati-msg {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.chati-msg.bot { align-self: flex-start; }
.chati-msg.user { align-self: flex-end; }

.chati-bubble-msg {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  font-weight: 400;
  letter-spacing: -0.1px;
}

.chati-msg.bot .chati-bubble-msg {
  background: #1c1c1c;
  color: #e0e0e0;
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(255,255,255,0.05);
}

.chati-msg.user .chati-bubble-msg {
  background: #fff;
  color: #0a0a0a;
  border-bottom-right-radius: 4px;
}

.chati-ts {
  font-size: 10.5px;
  color: #333;
  margin-top: 3px;
  padding: 0 3px;
}
.chati-msg.user .chati-ts { text-align: right; }

.chati-typing-wrap {
  align-self: flex-start;
  animation: fadeUp 0.25s ease;
}

.chati-typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 11px 14px;
  background: #1c1c1c;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.chati-typing span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #444;
  animation: bounce 1.2s infinite;
}
.chati-typing span:nth-child(2) { animation-delay: 0.15s; }
.chati-typing span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%,60%,100% { transform: translateY(0); background: #444; }
  30% { transform: translateY(-5px); background: #777; }
}

.chati-input-area {
  padding: 10px 14px 14px;
  border-top: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}

.chati-input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 13px;
  padding: 9px 10px 9px 14px;
  transition: border-color 0.2s;
}

.chati-input-wrap:focus-within { border-color: rgba(255,255,255,0.15); }

#chati-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #e0e0e0;
  font-size: 14px;
  font-family: 'DM Sans', 'Noto Sans Georgian', sans-serif;
  font-weight: 400;
  line-height: 1.5;
  resize: none;
  max-height: 90px;
  overflow-y: auto;
}

#chati-input::placeholder { color: #3a3a3a; }
#chati-input::-webkit-scrollbar { width: 0; }

#chati-send {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  background: #fff;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.15s, opacity 0.15s;
}

#chati-send:hover { background: #e5e5e5; transform: scale(1.05); }
#chati-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

.chati-footer {
  text-align: center;
  font-size: 10.5px;
  color: #2a2a2a;
  margin-top: 7px;
  letter-spacing: 0.3px;
}
</style>
</head>
<body>

<div class="demo-bg">
  <h1>CHATI</h1>
  <p>AI lead capture · click the bubble →</p>
</div>

<div id="chati-widget">
  <div id="chati-window">
    <div class="chati-header">
      <div class="chati-avatar">C</div>
      <div class="chati-header-info">
        <div class="chati-header-name">CHATI</div>
        <div class="chati-header-status">
          <div class="chati-dot"></div>
          Online · replies instantly
        </div>
      </div>
      <button class="chati-close" onclick="toggleChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="chati-messages" id="chati-messages"></div>

    <div class="chati-input-area">
      <div class="chati-input-wrap">
        <textarea id="chati-input" placeholder="Type a message..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="chati-send" onclick="sendMessage()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="chati-footer">Powered by CHATI</div>
    </div>
  </div>

  <button id="chati-bubble" onclick="toggleChat()">
    <svg id="icon-chat" width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg id="icon-close" width="18" height="18" viewBox="0 0 24 24" fill="none" style="display:none">
      <path d="M18 6L6 18M6 6l12 12" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="chati-unread" id="chati-unread">1</div>
  </button>
</div>

<script>
const WEBHOOK = 'https://primary-production-63cff.up.railway.app/webhook/86a7e847-6b5c-4f3f-8f3e-5a4a0b1f2427';

const SYSTEM = `You are CHATI, a friendly AI assistant for an automation agency. 
Detect the user's language from their very first message and respond ENTIRELY in that language for the whole conversation. Georgian → Georgian only. English → English only. Never mix.
Be warm and natural. Sound like a real person, not a robot. Never say "Certainly!", "Of course!", "Great question!".
Your goal: naturally collect their name, phone number, and what they need — conversationally, not like a form.
Keep responses short — max 2-3 sentences. Once you have all three pieces of info, warmly confirm and say someone from the team will be in touch very soon.`;

let isOpen = false;
let isBusy = false;
let history = [];
let hasOpened = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chati-window').classList.toggle('open', isOpen);
  document.getElementById('icon-chat').style.display = isOpen ? 'none' : 'block';
  document.getElementById('icon-close').style.display = isOpen ? 'block' : 'none';
  document.getElementById('chati-unread').classList.remove('show');

  if (isOpen && !hasOpened) {
    hasOpened = true;
    setTimeout(() => botMsg("Hey! 👋 How can I help you today?"), 500);
  }
  if (isOpen) setTimeout(() => document.getElementById('chati-input').focus(), 300);
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function botMsg(text) {
  const msgs = document.getElementById('chati-messages');
  const div = document.createElement('div');
  div.className = 'chati-msg bot';
  div.innerHTML = `<div class="chati-bubble-msg">${text.replace(/\n/g,'<br>')}</div><div class="chati-ts">${now()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function userMsg(text) {
  const msgs = document.getElementById('chati-messages');
  const div = document.createElement('div');
  div.className = 'chati-msg user';
  div.innerHTML = `<div class="chati-bubble-msg">${text}</div><div class="chati-ts">${now()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chati-messages');
  const div = document.createElement('div');
  div.className = 'chati-typing-wrap';
  div.id = 'typing';
  div.innerHTML = `<div class="chati-typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chati-input');
  const text = input.value.trim();
  if (!text || isBusy) return;

  input.value = '';
  input.style.height = 'auto';
  userMsg(text);
  history.push({ role: 'user', content: text });

  isBusy = true;
  document.getElementById('chati-send').disabled = true;
  showTyping();

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || "Sorry, something went wrong. Try again.";

    hideTyping();
    history.push({ role: 'assistant', content: reply });
    botMsg(reply);

  } catch(e) {
    hideTyping();
    botMsg("Connection issue. Please try again in a moment.");
  }

  isBusy = false;
  document.getElementById('chati-send').disabled = false;
  document.getElementById('chati-input').focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

setTimeout(() => {
  if (!isOpen) document.getElementById('chati-unread').classList.add('show');
}, 2500);
</script>
</body>
</html>
